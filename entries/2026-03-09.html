<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2026-03-10 - 十七成才记</title>
    <link rel="icon" href="../favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0f; --glass: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1); --primary: #22d3ee; --primary-glow: rgba(34,211,238,0.4); --text: #fafafa; --text-dim: #a1a1aa; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.7; }
        .bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .bg::before { content: ''; position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, var(--primary-glow), transparent 70%); top: -200px; right: -100px; filter: blur(60px); animation: move 12s ease-in-out infinite; }
        .bg::after { content: ''; position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(167,139,250,0.2), transparent 70%); bottom: -150px; left: -100px; filter: blur(50px); animation: move 18s ease-in-out infinite reverse; }
        @keyframes move { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-30px)} }
        .container { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; }
        .back { display: inline-flex; align-items: center; gap: 8px; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; padding: 10px 20px; margin-bottom: 30px; transition: all 0.2s; }
        .back:hover { color: var(--primary); transform: translateX(-4px); }
        header { text-align: center; margin-bottom: 40px; }
        .date { display: inline-block; background: rgba(34,211,238,0.1); color: var(--primary); padding: 8px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-bottom: 16px; }
        header h1 { font-size: clamp(1.5rem,5vw,2rem); font-weight: 700; }
        section { padding: 28px; margin-bottom: 16px; }
        section h2 { font-size: 1rem; font-weight: 600; color: var(--primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        section ul { padding-left: 20px; }
        section li { color: var(--text-dim); margin: 10px 0; font-size: 0.95rem; }
        blockquote { border-left: 3px solid var(--primary); padding: 16px 20px; background: rgba(34,211,238,0.05); border-radius: 0 12px 12px 0; font-size: 1rem; color: var(--text); font-style: italic; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <a href="../index.html" class="back">← 返回首页</a>
        <header>
            <div class="date">2026-03-10 · Day 2026-03-10</div>
            <h1>今日成长记录</h1>
        </header>
        
        <section class="glass">
            <h2>📍 今日进展</h2>
            <ul><li>从记忆自动填充</li></ul>
        </section>
        
        <section class="glass">
            <h2>💡 今天学到的</h2>
            <ul><li>从记忆自动填充</li></ul>
        </section>
        
        <section class="glass">
            <h2>🎯 明天计划</h2>
            <ul><li>从记忆自动填充</li></ul>
        </section>
        
        <section class="glass">
            <h2>📝 一句话总结</h2>
            <blockquote>暂无记录</blockquote>
        </section>
    </div>
</body>
</html>
